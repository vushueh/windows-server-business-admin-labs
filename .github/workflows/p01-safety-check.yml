name: P01 Safety Check

on:
  push:
    paths:
      - 'projects/project-01*/**'
      - 'scripts/**'
      - '.github/workflows/p01-safety-check.yml'
  pull_request:
    paths:
      - 'projects/project-01*/**'
      - 'scripts/**'
      - '.github/workflows/p01-safety-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: p01-safety-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  safety-check:
    name: Validate Before Live DC
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          Write-Host "=== Scanning P01 tracked files for secrets ===" -ForegroundColor Cyan
          $patterns = @(
            '(?i)(password|passwd|secret|token|api[_-]?key)\s*[:=]\s*[^\s''"]+',
            '(?i)nps-config.*\.xml'
          )

          $files = git ls-files | Where-Object {
            ($_ -match '^(projects/project-01[^/]*/|scripts/)') -and
            ($_ -match '\.(ps1|md|ya?ml|json|txt)$')
          }

          $found = $false
          foreach ($file in $files) {
            foreach ($pattern in $patterns) {
              $matches = Select-String -Path $file -Pattern $pattern -ErrorAction SilentlyContinue
              foreach ($match in $matches) {
                Write-Warning "Possible secret in $($match.Path):$($match.LineNumber)"
                $found = $true
              }
            }
          }

          if ($found) { exit 1 }
          Write-Host "No obvious hardcoded secrets found in P01 tracked files." -ForegroundColor Green

      - name: Validate PowerShell syntax
        run: |
          Write-Host "=== Validating PowerShell syntax ===" -ForegroundColor Cyan
          $errors = 0
          $files = git ls-files '*.ps1'

          foreach ($file in $files) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors) | Out-Null

            if ($parseErrors.Count -gt 0) {
              Write-Warning "Syntax error: $file"
              $parseErrors | ForEach-Object { Write-Warning "  Line $($_.Extent.StartLineNumber): $($_.Message)" }
              $errors++
            } else {
              Write-Host "OK $file"
            }
          }

          if ($errors -gt 0) { exit 1 }

      - name: Check NPS XML not committed
        run: |
          Write-Host "=== Checking for NPS XML exports ===" -ForegroundColor Cyan
          $npsFiles = git ls-files | Where-Object { $_ -match '(?i)nps-config.*\.xml$' }
          if ($npsFiles) {
            $npsFiles | ForEach-Object { Write-Error "NPS XML found: $_" }
            exit 1
          }
          Write-Host "No NPS XML files are tracked." -ForegroundColor Green

      - name: Check Default Domain Policy not modified
        run: ./scripts/Test-DefaultDomainPolicySafety.ps1
